# Navigation policy for tools/cos_ship.py. Elevated scope (policy/**).
# Owner-resolved decisions recorded in docs/navigation-layer.md sections 7-8.
version: "0.2.0"
publisher:
  kind: github_app
  app_id: 4278642
  installation_id: 146047322
  slug: cm4bery-cos-executor
  bot_login: "cm4bery-cos-executor[bot]"
  pr_author_login: app/cm4bery-cos-executor
  repository: CM4BERY/cos
  private_key_path: ~/.config/cos/cos-executor.pem
  api_version: "2026-03-10"
  repository_selection: selected
  permissions:
    actions: read
    checks: read
    contents: write
    metadata: read
    pull_requests: write
    statuses: read
merge_method: squash
delete_branch_after_merge: true
draft_pull_requests: true
allow_admin_merge: false
# Initial App posture: every lane is review-mode. cos_ship opens a draft PR,
# watches checks, and stops before merging; CMABERY reviews and completes the
# merge without granting the App ruleset bypass. Decision of record:
# docs/navigation-layer.md section 8 and amendment A-0002.
bypass:
  low: review
  medium: review
  high: review
  critical: review
