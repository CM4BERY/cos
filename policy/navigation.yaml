# Navigation policy for tools/cos_ship.py. Elevated scope (policy/**).
# Owner-resolved decisions recorded in docs/navigation-layer.md section 7.
version: "0.1.0"
expected_account: CMABERY
merge_method: squash
delete_branch_after_merge: true
# Bypass evidence lives where the bypass happens: GitHub's PR timeline.
# review lanes: cos_ship opens the PR, watches checks, and stops before
# merging; a human completes the merge and records the one-line reason as
# their PR review/merge comment (the typed-comment code path in cos_ship is
# flag-mode only). governance_debt.py (Stage 3) counts bypass-merged PRs by
# lane. Decision of record: docs/navigation-layer.md section 7, item 4.
bypass:
  low: auto        # merge with --admin, no ceremony
  medium: auto
  high: review     # ship stops before merge; a human reviews and completes it
  critical: review
